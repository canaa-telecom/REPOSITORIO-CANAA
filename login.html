<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Canaã Telecom</title>
    <link rel="icon" type="image/png" href="/canaa_logo.png">
    <!-- Aplica tema salvo ANTES do render para evitar flash -->
    <script>
        if (localStorage.getItem('canaa_tema') === 'dark') {
            document.documentElement.classList.add('dark');
        }
    </script>

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        display: ['"Exo 2"', 'sans-serif'],
                        body: ['"DM Sans"', 'sans-serif'],
                    },
                    colors: {
                        canaa: {
                            bg: '#0a1128',
                            blue: '#1d4ed8',
                            cyan: '#06b6d4',
                        }
                    },
                    animation: {
                        'float': 'float 6s ease-in-out infinite',
                        'pulse-slow': 'pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                    },
                    keyframes: {
                        float: {
                            '0%, 100%': { transform: 'translateY(0px)' },
                            '50%': { transform: 'translateY(-12px)' },
                        }
                    }
                }
            }
        }
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap"
        rel="stylesheet">

    <style>
        body {
            font-family: 'DM Sans', sans-serif;
            background-color: #0a1128;
            min-height: 100vh;
            overflow: hidden;
        }

        /* Esferas decorativas de fundo */
        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.15;
            pointer-events: none;
            animation: float 6s ease-in-out infinite;
        }

        .orb-1 {
            width: 400px;
            height: 400px;
            background: #1d4ed8;
            top: -100px;
            left: -100px;
        }

        .orb-2 {
            width: 350px;
            height: 350px;
            background: #06b6d4;
            bottom: -80px;
            right: -80px;
            animation-delay: 3s;
        }

        .orb-3 {
            width: 250px;
            height: 250px;
            background: #7c3aed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation-delay: 1.5s;
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-16px);
            }
        }

        /* Card glassmorphism */
        .glass-card {
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.07);
        }

        /* Input com foco neon */
        .input-neon {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.12);
            color: #f1f5f9;
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        .input-neon:focus {
            outline: none;
            border-color: #06b6d4;
            box-shadow: 0 0 0 3px rgba(6, 182, 212, 0.15);
        }

        .input-neon::placeholder {
            color: #475569;
        }

        /* Botão com shimmer */
        .btn-login {
            position: relative;
            overflow: hidden;
            background: linear-gradient(135deg, #1d4ed8, #06b6d4);
            transition: opacity 0.2s, box-shadow 0.3s, transform 0.15s;
        }

        .btn-login:hover {
            opacity: 0.92;
            box-shadow: 0 0 30px rgba(6, 182, 212, 0.5);
            transform: translateY(-1px);
        }

        .btn-login:active {
            transform: translateY(0);
        }

        .btn-login::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -60%;
            width: 40%;
            height: 200%;
            background: rgba(255, 255, 255, 0.15);
            transform: skewX(-20deg);
            transition: left 0.5s;
        }

        .btn-login:hover::after {
            left: 120%;
        }

        /* Grade de fundo sutil */
        .bg-grid {
            background-image: linear-gradient(rgba(6, 182, 212, 0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(6, 182, 212, 0.04) 1px, transparent 1px);
            background-size: 40px 40px;
        }

        /* Animação de entrada do card */
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(24px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .animate-slide-up {
            animation: slideUp 0.5s ease-out forwards;
        }

        /* ── TEMA CLARO — overrides ── */
        html:not(.dark) body {
            background-color: #eef2ff;
        }

        html:not(.dark) .orb-1 {
            background: #6366f1;
            opacity: 0.10;
        }

        html:not(.dark) .orb-2 {
            background: #06b6d4;
            opacity: 0.10;
        }

        html:not(.dark) .orb-3 {
            background: #a78bfa;
            opacity: 0.08;
        }

        html:not(.dark) .glass-card {
            background: rgba(255, 255, 255, 0.85);
            border: 1px solid rgba(99, 102, 241, 0.15);
            box-shadow: 0 25px 50px rgba(99, 102, 241, 0.1), inset 0 1px 0 rgba(255, 255, 255, 0.9);
        }

        html:not(.dark) .input-neon {
            background: #f8fafc;
            border: 1px solid #cbd5e1;
            color: #0f172a;
        }

        html:not(.dark) .input-neon:focus {
            border-color: #6366f1;
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.12);
        }

        html:not(.dark) .input-neon::placeholder {
            color: #94a3b8;
        }

        html:not(.dark) h1 {
            color: #1e293b !important;
        }

        html:not(.dark) label {
            color: #64748b !important;
        }

        html:not(.dark) p.text-slate-400 {
            color: #64748b !important;
        }

        html:not(.dark) p.text-slate-600 {
            color: #94a3b8 !important;
        }

        /* Botão de toggle de tema */
        .btn-tema-login {
            position: fixed;
            top: 1rem;
            right: 1rem;
            z-index: 50;
            width: 2.25rem;
            height: 2.25rem;
            border-radius: 9999px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: background 0.2s, box-shadow 0.2s;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }

        html.dark .btn-tema-login {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.12);
            color: #94a3b8;
        }

        html:not(.dark) .btn-tema-login {
            background: rgba(255, 255, 255, 0.75);
            border: 1px solid rgba(99, 102, 241, 0.2);
            color: #64748b;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
        }

        .btn-tema-login:hover {
            opacity: 0.8;
        }
    </style>
</head>

<body class="bg-canaa-bg bg-grid flex items-center justify-center min-h-screen">

    <!-- Botão de alternância de tema -->
    <button onclick="alternarTemaLogin()" class="btn-tema-login" title="Alternar tema">
        <svg id="loginIconSun" class="w-4 h-4 hidden" fill="currentColor" viewBox="0 0 20 20">
            <path fill-rule="evenodd"
                d="M10 2a1 1 0 011 1v1a1 1 0 11-2 0V3a1 1 0 011-1zm4 8a4 4 0 11-8 0 4 4 0 018 0zm-.464 4.95l.707.707a1 1 0 001.414-1.414l-.707-.707a1 1 0 00-1.414 1.414zm2.12-10.607a1 1 0 010 1.414l-.706.707a1 1 0 11-1.414-1.414l.707-.707a1 1 0 011.414 0zM17 11a1 1 0 100-2h-1a1 1 0 100 2h1zm-7 4a1 1 0 011 1v1a1 1 0 11-2 0v-1a1 1 0 011-1zM5.05 6.464A1 1 0 106.465 5.05l-.708-.707a1 1 0 00-1.414 1.414l.707.707zm1.414 8.486l-.707.707a1 1 0 01-1.414-1.414l.707-.707a1 1 0 011.414 1.414zM4 11a1 1 0 100-2H3a1 1 0 000 2h1z"
                clip-rule="evenodd" />
        </svg>
        <svg id="loginIconMoon" class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20">
            <path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z" />
        </svg>
    </button>

    <!-- Esferas decorativas -->
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>

    <!-- Card de Login -->
    <div class="relative z-10 w-full max-w-md px-4 animate-slide-up">
        <div class="glass-card rounded-3xl p-8 sm:p-10">

            <!-- Logo + Título -->
            <div class="flex flex-col items-center mb-8">
                <img src="canaa_logo.png" alt="Canaã Telecom"
                    class="h-14 w-auto object-contain mb-4 drop-shadow-[0_0_16px_rgba(6,182,212,0.4)]" />
                <h1 class="font-display font-bold text-2xl text-white tracking-wide">Central de Agendamento</h1>
                <p class="text-sm text-slate-400 mt-1">Faça login para continuar</p>
            </div>

            <!-- Formulário -->
            <form id="formLogin" onsubmit="realizarLogin(event)" class="space-y-5">

                <!-- E-mail -->
                <div>
                    <label
                        class="block text-xs font-semibold text-slate-400 mb-1.5 uppercase tracking-widest">E-mail</label>
                    <input type="email" id="inputEmail" placeholder="seu@email.com" autocomplete="email"
                        class="input-neon w-full px-4 py-3 rounded-xl text-sm" />
                </div>

                <!-- Senha -->
                <div>
                    <label
                        class="block text-xs font-semibold text-slate-400 mb-1.5 uppercase tracking-widest">Senha</label>
                    <div class="relative">
                        <input type="password" id="inputSenha" placeholder="••••••••" autocomplete="current-password"
                            class="input-neon w-full px-4 py-3 pr-12 rounded-xl text-sm" />
                        <!-- Botão mostrar/ocultar senha -->
                        <button type="button" onclick="alternarSenha()"
                            class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-500 hover:text-slate-300 transition-colors p-1">
                            <svg id="iconOlhoAberto" class="w-5 h-5" fill="none" stroke="currentColor"
                                viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                            </svg>
                            <svg id="iconOlhoFechado" class="w-5 h-5 hidden" fill="none" stroke="currentColor"
                                viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21" />
                            </svg>
                        </button>
                    </div>
                </div>

                <!-- Alerta de erro -->
                <div id="boxErro" class="hidden rounded-xl border p-3
                    border-red-300 bg-red-50 dark:border-red-400/40 dark:bg-red-900/30">
                    <p id="msgErro" class="text-sm font-medium text-center
                        text-red-700 dark:text-red-300"></p>
                </div>

                <!-- Botão Entrar -->
                <button type="submit" id="btnLogin"
                    class="btn-login w-full py-4 rounded-xl text-sm font-bold uppercase tracking-widest text-white mt-2">
                    <span id="btnTextoLogin">Entrar</span>
                </button>

            </form>

            <!-- Rodapé do card -->
            <p class="text-center text-xs text-slate-600 mt-8">
                © 2026 Canaã Telecom — v3.0.0
            </p>
        </div>

    </div>

    <script>
        // Verificação: se já estiver logado, redireciona direto para o dashboard
        if (localStorage.getItem('canaa_token')) {
            window.location.href = '/index.html';
        }

        /** Inicializa o ícone correto conforme o tema atual */
        function sincronizarIconeTema() {
            const isDark = document.documentElement.classList.contains('dark');
            document.getElementById('loginIconSun').classList.toggle('hidden', !isDark);
            document.getElementById('loginIconMoon').classList.toggle('hidden', isDark);
        }

        /** Alterna entre dark e light na tela de login */
        function alternarTemaLogin() {
            document.documentElement.classList.toggle('dark');
            sincronizarIconeTema();
            // Persiste a preferência do usuário
            const isDark = document.documentElement.classList.contains('dark');
            localStorage.setItem('canaa_tema', isDark ? 'dark' : 'light');
        }

        // Aplica ícone correto ao carregar
        sincronizarIconeTema();

        /** Alterna visibilidade da senha */
        function alternarSenha() {
            const input = document.getElementById('inputSenha');
            const aberto = document.getElementById('iconOlhoAberto');
            const fechado = document.getElementById('iconOlhoFechado');
            const visivel = input.type === 'password';
            input.type = visivel ? 'text' : 'password';
            aberto.classList.toggle('hidden', visivel);
            fechado.classList.toggle('hidden', !visivel);
        }

        /** Envia as credenciais para a API e salva o token se válidas */
        async function realizarLogin(event) {
            event.preventDefault();

            const boxErro = document.getElementById('boxErro');
            const msgErro = document.getElementById('msgErro');
            const btn = document.getElementById('btnLogin');
            const btnText = document.getElementById('btnTextoLogin');

            boxErro.classList.add('hidden');
            btn.disabled = true;
            btnText.textContent = 'Verificando...';

            const email = document.getElementById('inputEmail').value.trim();
            const senha = document.getElementById('inputSenha').value;

            try {
                const resposta = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, senha })
                });

                const dados = await resposta.json();

                if (!resposta.ok) {
                    msgErro.textContent = dados.mensagem || 'Credenciais inválidas.';
                    boxErro.classList.remove('hidden');
                    return;
                }

                // Salva token e dados do usuário no localStorage
                localStorage.setItem('canaa_token', dados.token);
                localStorage.setItem('canaa_usuario', JSON.stringify(dados.usuario));

                // Redireciona para o dashboard
                window.location.href = '/index.html';

            } catch (err) {
                msgErro.textContent = 'Erro ao conectar com o servidor.';
                boxErro.classList.remove('hidden');
            } finally {
                btn.disabled = false;
                btnText.textContent = 'Entrar';
            }
        }
    </script>

</body>

</html>
