<!DOCTYPE html>
<html lang="pt-BR" class="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Canaã Telecom</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        display: ['"Exo 2"', 'sans-serif'],
                        body: ['"DM Sans"', 'sans-serif'],
                    },
                    colors: {
                        canaa: {
                            bg: '#0a1128',
                            blue: '#1d4ed8',
                            cyan: '#06b6d4',
                        }
                    },
                    animation: {
                        'float': 'float 6s ease-in-out infinite',
                        'pulse-slow': 'pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                    },
                    keyframes: {
                        float: {
                            '0%, 100%': { transform: 'translateY(0px)' },
                            '50%': { transform: 'translateY(-12px)' },
                        }
                    }
                }
            }
        }
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap"
        rel="stylesheet">

    <style>
        body {
            font-family: 'DM Sans', sans-serif;
            background-color: #0a1128;
            min-height: 100vh;
            overflow: hidden;
        }

        /* Esferas decorativas de fundo */
        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.15;
            pointer-events: none;
            animation: float 6s ease-in-out infinite;
        }

        .orb-1 {
            width: 400px;
            height: 400px;
            background: #1d4ed8;
            top: -100px;
            left: -100px;
        }

        .orb-2 {
            width: 350px;
            height: 350px;
            background: #06b6d4;
            bottom: -80px;
            right: -80px;
            animation-delay: 3s;
        }

        .orb-3 {
            width: 250px;
            height: 250px;
            background: #7c3aed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation-delay: 1.5s;
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-16px);
            }
        }

        /* Card glassmorphism */
        .glass-card {
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.07);
        }

        /* Input com foco neon */
        .input-neon {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.12);
            color: #f1f5f9;
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        .input-neon:focus {
            outline: none;
            border-color: #06b6d4;
            box-shadow: 0 0 0 3px rgba(6, 182, 212, 0.15);
        }

        .input-neon::placeholder {
            color: #475569;
        }

        /* Botão com shimmer */
        .btn-login {
            position: relative;
            overflow: hidden;
            background: linear-gradient(135deg, #1d4ed8, #06b6d4);
            transition: opacity 0.2s, box-shadow 0.3s, transform 0.15s;
        }

        .btn-login:hover {
            opacity: 0.92;
            box-shadow: 0 0 30px rgba(6, 182, 212, 0.5);
            transform: translateY(-1px);
        }

        .btn-login:active {
            transform: translateY(0);
        }

        .btn-login::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -60%;
            width: 40%;
            height: 200%;
            background: rgba(255, 255, 255, 0.15);
            transform: skewX(-20deg);
            transition: left 0.5s;
        }

        .btn-login:hover::after {
            left: 120%;
        }

        /* Grade de fundo sutil */
        .bg-grid {
            background-image: linear-gradient(rgba(6, 182, 212, 0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(6, 182, 212, 0.04) 1px, transparent 1px);
            background-size: 40px 40px;
        }

        /* Animação de entrada do card */
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(24px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .animate-slide-up {
            animation: slideUp 0.5s ease-out forwards;
        }
    </style>
</head>

<body class="bg-canaa-bg bg-grid flex items-center justify-center min-h-screen">

    <!-- Esferas decorativas -->
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>

    <!-- Card de Login -->
    <div class="relative z-10 w-full max-w-md px-4 animate-slide-up">
        <div class="glass-card rounded-3xl p-8 sm:p-10">

            <!-- Logo + Título -->
            <div class="flex flex-col items-center mb-8">
                <img src="canaa_logo.png" alt="Canaã Telecom"
                    class="h-14 w-auto object-contain mb-4 drop-shadow-[0_0_16px_rgba(6,182,212,0.4)]" />
                <h1 class="font-display font-bold text-2xl text-white tracking-wide">Central de Agendamento</h1>
                <p class="text-sm text-slate-400 mt-1">Faça login para continuar</p>
            </div>

            <!-- Formulário -->
            <form id="formLogin" onsubmit="realizarLogin(event)" class="space-y-5">

                <!-- E-mail -->
                <div>
                    <label
                        class="block text-xs font-semibold text-slate-400 mb-1.5 uppercase tracking-widest">E-mail</label>
                    <input type="email" id="inputEmail" placeholder="seu@email.com" autocomplete="email"
                        class="input-neon w-full px-4 py-3 rounded-xl text-sm" />
                </div>

                <!-- Senha -->
                <div>
                    <label
                        class="block text-xs font-semibold text-slate-400 mb-1.5 uppercase tracking-widest">Senha</label>
                    <div class="relative">
                        <input type="password" id="inputSenha" placeholder="••••••••" autocomplete="current-password"
                            class="input-neon w-full px-4 py-3 pr-12 rounded-xl text-sm" />
                        <!-- Botão mostrar/ocultar senha -->
                        <button type="button" onclick="alternarSenha()"
                            class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-500 hover:text-slate-300 transition-colors p-1">
                            <svg id="iconOlhoAberto" class="w-5 h-5" fill="none" stroke="currentColor"
                                viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                            </svg>
                            <svg id="iconOlhoFechado" class="w-5 h-5 hidden" fill="none" stroke="currentColor"
                                viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21" />
                            </svg>
                        </button>
                    </div>
                </div>

                <!-- Alerta de erro -->
                <div id="boxErro" class="hidden rounded-xl border border-red-400/40 bg-red-900/30 p-3">
                    <p id="msgErro" class="text-sm text-red-300 text-center"></p>
                </div>

                <!-- Botão Entrar -->
                <button type="submit" id="btnLogin"
                    class="btn-login w-full py-4 rounded-xl text-sm font-bold uppercase tracking-widest text-white mt-2">
                    <span id="btnTextoLogin">Entrar</span>
                </button>

            </form>

            <!-- Rodapé do card -->
            <p class="text-center text-xs text-slate-600 mt-8">
                © 2026 Canaã Telecom — v2.1
            </p>
        </div>

        <!-- Dica de acesso (só para desenvolvimento) -->
        <div class="mt-4 text-center">
            <p class="text-xs text-slate-600">
                Acesso inicial: <span class="text-slate-500 font-mono">admin@canaa.com</span> /
                <span class="text-slate-500 font-mono">admin123</span>
            </p>
        </div>
    </div>

    <script>
        // Verificação: se já estiver logado, redireciona direto para o dashboard
        if (localStorage.getItem('canaa_token')) {
            window.location.href = '/index.html';
        }

        /** Alterna visibilidade da senha */
        function alternarSenha() {
            const input = document.getElementById('inputSenha');
            const aberto = document.getElementById('iconOlhoAberto');
            const fechado = document.getElementById('iconOlhoFechado');
            const visivel = input.type === 'password';
            input.type = visivel ? 'text' : 'password';
            aberto.classList.toggle('hidden', visivel);
            fechado.classList.toggle('hidden', !visivel);
        }

        /** Envia as credenciais para a API e salva o token se válidas */
        async function realizarLogin(event) {
            event.preventDefault();

            const boxErro = document.getElementById('boxErro');
            const msgErro = document.getElementById('msgErro');
            const btn = document.getElementById('btnLogin');
            const btnText = document.getElementById('btnTextoLogin');

            boxErro.classList.add('hidden');
            btn.disabled = true;
            btnText.textContent = 'Verificando...';

            const email = document.getElementById('inputEmail').value.trim();
            const senha = document.getElementById('inputSenha').value;

            try {
                const resposta = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, senha })
                });

                const dados = await resposta.json();

                if (!resposta.ok) {
                    msgErro.textContent = dados.mensagem || 'Credenciais inválidas.';
                    boxErro.classList.remove('hidden');
                    return;
                }

                // Salva token e dados do usuário no localStorage
                localStorage.setItem('canaa_token', dados.token);
                localStorage.setItem('canaa_usuario', JSON.stringify(dados.usuario));

                // Redireciona para o dashboard
                window.location.href = '/index.html';

            } catch (err) {
                msgErro.textContent = 'Erro ao conectar com o servidor.';
                boxErro.classList.remove('hidden');
            } finally {
                btn.disabled = false;
                btnText.textContent = 'Entrar';
            }
        }
    </script>

</body>

</html>
